version: "3.8"
services:
  postgres:
    image: postgres:16-alpine
    container_name: pulsemind-postgres
    environment:
      POSTGRES_DB: pulsemind
      POSTGRES_USER: pulsemind
      POSTGRES_PASSWORD: pulsemind
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

